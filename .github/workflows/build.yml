name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host tools
        run: brew install ldid

      - name: Use classic ld for dyldhook (tbd-v2 stub)
        run: sed -i.bak 's|^LDFLAGS = |LDFLAGS = -Wl,-ld_classic |' basebin/dyldhook/Makefile

      - name: Cache Theos + iOS SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-roothide-${{ runner.os }}-v1

      - name: Install Theos + iOS SDKs
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/roothide/theos "$HOME/theos"
          mkdir -p "$HOME/theos/sdks"
          cd "$HOME/theos/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git tmp
          mv tmp/iPhoneOS*.sdk .
          rm -rf tmp

      - name: Build
        run: |
          export THEOS=$HOME/theos
          ./build.sh

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap-${{ github.sha }}
          path: packages/Bootstrap.tipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/Bootstrap.tipa
          generate_release_notes: true
