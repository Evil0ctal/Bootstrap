name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Procursus packages (ldid + GNU coreutils)
        uses: dhinakg/procursus-action@main
        with:
          packages: ldid findutils sed coreutils make

      - name: Install libplist headers (basebin/ldid build dep)
        run: brew install libplist

      - name: Install Theos + iPhoneOS16.5 SDK
        run: |
          set -x
          export THEOS="$HOME/theos"
          mkdir -p "$THEOS"
          curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos -o install-theos.sh
          gsed -E "/^\s*get_theos\s*$/,+1 s/^(\s*)(get_sdks)\s*$/\1mkdir -p \${THEOS}\/sdks\n\1touch \${THEOS}\/sdks\/sdk\n\1\2/g" -i install-theos.sh
          bash install-theos.sh
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz -o "$THEOS/sdks/iPhoneOS16.5.sdk.tar.xz"
          gunzip "$THEOS/sdks/iPhoneOS16.5.sdk.tar.xz"
          tar -xf "$THEOS/sdks/iPhoneOS16.5.sdk.tar" -C "$THEOS/sdks"
          rm "$THEOS/sdks/iPhoneOS16.5.sdk.tar"
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Download prebuilt Dobby (libdobby.a symlink target)
        run: |
          DOBBY_DIR="$GITHUB_WORKSPACE/../Dobby-master"
          mkdir -p "$DOBBY_DIR"
          curl -fsSL https://github.com/jmpews/Dobby/releases/download/latest/dobby-iphoneos-all.tar.gz \
            | tar -xz -C "$DOBBY_DIR"
          ls -la "$DOBBY_DIR/build/iphoneos/universal/libdobby.a"

      - name: Drop Xcode SDK xpc shim (let basebin's bundled headers take over)
        run: |
          XCSDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          sudo rm -rf "$XCSDK/usr/include/xpc" "$XCSDK/usr/include/xpc.modulemap"

      - name: Merge missing private frameworks from theos SDK into Xcode SDK
        run: |
          XCSDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          THEOS_SDK=$(ls -d "$THEOS"/sdks/iPhoneOS*.sdk 2>/dev/null | tail -n1)
          if [ -n "$THEOS_SDK" ]; then
            sudo cp -aRn "$THEOS_SDK/System/Library/PrivateFrameworks/." "$XCSDK/System/Library/PrivateFrameworks/" || true
          fi

      - name: Use classic ld for dyldhook (tbd-v2 stub)
        run: sed -i.bak 's|^LDFLAGS = |LDFLAGS = -Wl,-ld_classic |' basebin/dyldhook/Makefile

      - name: Inject cassert (no longer transitively pulled on iOS17 sdk)
        run: |
          F=basebin/appatch/realstore.cpp
          grep -q '<cassert>' "$F" || printf '#include <cassert>\n%s' "$(cat "$F")" > "$F"

      - name: Build
        env:
          ADDITIONAL_CFLAGS: "-Wno-error=module-import-in-extern-c -Wno-error=nonportable-include-path"
          ADDITIONAL_CCFLAGS: "-Wno-error=module-import-in-extern-c -Wno-error=nonportable-include-path"
        run: ./build.sh

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap-${{ github.sha }}
          path: packages/Bootstrap.tipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/Bootstrap.tipa
          generate_release_notes: true
