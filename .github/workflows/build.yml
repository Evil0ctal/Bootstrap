name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      THEOS: /Users/runner/theos
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host tools
        run: brew install ldid xz

      - name: Cache Theos + SDK + Dobby
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            /Users/runner/theos
            /Users/runner/work/Bootstrap/Dobby-master
          key: theos-dobby-${{ runner.os }}-v3

      - name: Install Theos (roothide)
        if: steps.cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/roothide/theos "$THEOS"

      - name: Install iPhoneOS SDK via theos install-sdk
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: $THEOS/bin/install-sdk latest

      - name: Download prebuilt Dobby (libdobby.a symlink target)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          DOBBY_DIR="$GITHUB_WORKSPACE/../Dobby-master"
          mkdir -p "$DOBBY_DIR"
          curl -fsSL https://github.com/jmpews/Dobby/releases/download/latest/dobby-iphoneos-all.tar.gz \
            | tar -xz -C "$DOBBY_DIR"
          ls -la "$DOBBY_DIR/build/iphoneos/universal/libdobby.a"

      - name: Borrow private frameworks into Xcode SDK
        run: |
          XCSDK_PF="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/System/Library/PrivateFrameworks"
          THEOS_SDK_DIR="$THEOS/sdks"
          THEOS_PF=$(ls -d "$THEOS_SDK_DIR"/iPhoneOS*.sdk/System/Library/PrivateFrameworks 2>/dev/null | tail -n1)
          if [ -n "$THEOS_PF" ] && [ -d "$THEOS_PF" ]; then
            sudo cp -aRn "$THEOS_PF"/. "$XCSDK_PF/"
            echo "merged from $THEOS_PF"
          fi

      - name: Patch sources for iOS17 SDK / Xcode 15
        run: |
          sed -i.bak 's|^LDFLAGS = |LDFLAGS = -Wl,-ld_classic |' basebin/dyldhook/Makefile
          rm -rf basebin/common/xpc
          F=basebin/appatch/realstore.cpp
          grep -q '<cassert>' "$F" || printf '#include <cassert>\n%s' "$(cat "$F")" > "$F"

      - name: Build
        env:
          ADDITIONAL_CFLAGS: -Wno-error=module-import-in-extern-c
          ADDITIONAL_CCFLAGS: -Wno-error=module-import-in-extern-c
        run: ./build.sh

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap-${{ github.sha }}
          path: packages/Bootstrap.tipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/Bootstrap.tipa
          generate_release_notes: true
