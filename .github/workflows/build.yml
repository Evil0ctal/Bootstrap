name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host tools
        run: brew install ldid

      - name: Use classic ld for dyldhook (tbd-v2 stub)
        run: sed -i.bak 's|^LDFLAGS = |LDFLAGS = -Wl,-ld_classic |' basebin/dyldhook/Makefile

      - name: Drop legacy xpc modulemap (SDK already provides it on iOS17+)
        run: rm -f basebin/common/xpc/module.modulemap

      - name: Add missing cassert include (no longer transitively pulled on iOS17 sdk)
        run: |
          F=basebin/appatch/realstore.cpp
          grep -q '<cassert>' "$F" || printf '#include <cassert>\n%s' "$(cat "$F")" > "$F"

      - name: Cache Theos + iOS SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-roothide-${{ runner.os }}-ios16.5-v2

      - name: Install Theos + iPhoneOS16.5 SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/roothide/theos "$HOME/theos"
          mkdir -p "$HOME/theos/sdks"
          cd "$HOME/theos/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git tmp
          mv tmp/iPhoneOS16.5.sdk .
          rm -rf tmp

      - name: Merge private frameworks into Xcode SDK
        run: |
          XCSDK_PF="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/System/Library/PrivateFrameworks"
          THEOS_PF="$HOME/theos/sdks/iPhoneOS16.5.sdk/System/Library/PrivateFrameworks"
          sudo cp -aRn "$THEOS_PF"/. "$XCSDK_PF/"
          ls "$XCSDK_PF" | grep -c MobileContainerManager

      - name: Build
        env:
          THEOS: /Users/runner/theos
          ADDITIONAL_CFLAGS: -Wno-error=module-import-in-extern-c
          ADDITIONAL_CCFLAGS: -Wno-error=module-import-in-extern-c
        run: ./build.sh

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap-${{ github.sha }}
          path: packages/Bootstrap.tipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/Bootstrap.tipa
          generate_release_notes: true
