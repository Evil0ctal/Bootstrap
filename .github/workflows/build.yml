name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host tools
        run: brew install ldid

      - name: Use classic ld for dyldhook (tbd-v2 stub)
        run: sed -i.bak 's|^LDFLAGS = |LDFLAGS = -Wl,-ld_classic |' basebin/dyldhook/Makefile

      - name: Drop legacy xpc modulemap (SDK already provides it on iOS17+)
        run: rm -f basebin/common/xpc/module.modulemap

      - name: Cache Theos + iOS SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-roothide-${{ runner.os }}-ios16.5-v1

      - name: Install Theos + iPhoneOS16.5 SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/roothide/theos "$HOME/theos"
          mkdir -p "$HOME/theos/sdks"
          cd "$HOME/theos/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git tmp
          mv tmp/iPhoneOS16.5.sdk .
          rm -rf tmp

      - name: Pin Xcode iPhoneOS SDK to 16.5 (private frameworks present, no xpc modulemap conflict)
        run: |
          XCSDK="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs"
          sudo mv "$XCSDK"/iPhoneOS*.sdk /tmp/ 2>/dev/null || true
          sudo ln -sf "$HOME/theos/sdks/iPhoneOS16.5.sdk" "$XCSDK/iPhoneOS.sdk"
          sudo ln -sf "$HOME/theos/sdks/iPhoneOS16.5.sdk" "$XCSDK/iPhoneOS16.5.sdk"
          ls -la "$XCSDK"

      - name: Build
        env:
          THEOS: /Users/runner/theos
          ADDITIONAL_CFLAGS: -Wno-error=module-import-in-extern-c
          ADDITIONAL_CCFLAGS: -Wno-error=module-import-in-extern-c
        run: ./build.sh

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: Bootstrap-${{ github.sha }}
          path: packages/Bootstrap.tipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/Bootstrap.tipa
          generate_release_notes: true
